<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pointer Map Calc + XOR Tool • Matcha</title>
    <style>
        html, body, * {
            cursor: none !important;
        }
        p, h1, h2, h3, span, div, input, textarea, button, label {
            cursor: none !important;
        }

        /* Theme xanh */
        :root {
            --bg: #f4f0e6;
            --card: #ffffff;
            --text: #2e3b2e;
            --accent: #6b8e6b;
            --accent-hover: #557a55;
            --input-bg: #f9f7f2;
            --border: #ccd5c5;
            --shadow: 0 4px 12px rgba(0,0,0,0.05);
            --radius: 14px;
            --transition: 0.2s ease;
        }
        .dark {
            --bg: #1e2a1e;
            --card: #2a362a;
            --text: #e6ede6;
            --accent: #8fbc8f;
            --accent-hover: #a3cfa3;
            --input-bg: #313f31;
            --border: #4a5a4a;
            --shadow: 0 4px 16px rgba(0,0,0,0.3);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        body {
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            transition: background 0.3s, color 0.3s;
        }
        .container {
            width: 100%;
            max-width: 620px;
        }
        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 2rem 2rem 1.8rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: background 0.3s, border 0.3s, box-shadow 0.3s;
            margin-bottom: 1rem;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.8rem;
        }
        .logo {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo span {
            font-size: 1.8rem;
        }
        .theme-toggle {
            background: none;
            border: 1.5px solid var(--accent);
            color: var(--accent);
            border-radius: 20px;
            padding: 6px 16px;
            font-weight: 600;
            cursor: none;
            transition: var(--transition);
            font-size: 0.9rem;
        }
        .theme-toggle:hover {
            background: var(--accent);
            color: white;
        }
        .input-group {
            margin-bottom: 1.4rem;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text);
            opacity: 0.85;
            font-size: 0.95rem;
        }
        input {
            width: 100%;
            padding: 12px 15px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 1rem;
            color: var(--text);
            outline: none;
            transition: var(--transition);
            font-family: 'Cascadia Code', 'Fira Code', monospace;
            letter-spacing: 0.5px;
        }
        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(107, 142, 107, 0.15);
        }
        .hint {
            font-size: 0.8rem;
            margin-top: 5px;
            opacity: 0.7;
            color: var(--text);
        }
        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 1.8rem 0 1.2rem;
        }
        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            cursor: none;
            transition: var(--transition);
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid transparent;
        }
        button:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        button.outline {
            background: transparent;
            color: var(--accent);
            border: 1.5px solid var(--accent);
        }
        button.outline:hover {
            background: rgba(107, 142, 107, 0.1);
        }
        .result-box {
            background: var(--input-bg);
            border-radius: 10px;
            padding: 14px 16px;
            border: 1px solid var(--border);
            margin-top: 5px;
            font-family: 'Cascadia Code', 'Fira Code', monospace;
            font-size: 1.1rem;
            word-break: break-all;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: var(--transition);
        }
        .result-value {
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.3px;
        }
        .copy-btn-small {
            background: none;
            border: none;
            color: var(--accent);
            cursor: none;
            font-size: 1.2rem;
            padding: 4px 8px;
            border-radius: 6px;
            transition: var(--transition);
        }
        .copy-btn-small:hover {
            background: rgba(107, 142, 107, 0.2);
        }
        .error-message {
            color: #c44;
            font-size: 0.9rem;
            margin-top: 0.3rem;
            display: none;
        }
        .divider {
            border-top: 1px solid var(--border);
            margin: 1.8rem 0 1.4rem;
            opacity: 0.7;
        }
        .xor-section h3 {
            font-size: 1.1rem;
            margin-bottom: 1rem;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .xor-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            flex-wrap: wrap;
        }
        .xor-input {
            flex: 1 1 140px;
        }
        .xor-input label {
            font-size: 0.85rem;
            margin-bottom: 4px;
        }
        .xor-input input {
            padding: 10px 12px;
        }
        .xor-result {
            font-family: 'Cascadia Code', 'Fira Code', monospace;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 12px;
            word-break: break-all;
            margin-top: 8px;
            font-size: 0.95rem;
            color: var(--accent);
        }
        .footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.8rem;
            opacity: 0.6;
        }

        /* cursor overlay */
        #cursor-canvas {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 999999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <div class="logo">
                    <span>🍵</span> Pointer Map Calc
                </div>
                <button class="theme-toggle" id="themeToggle" aria-label="Chuyển chế độ sáng/tối">
                    🌙 Dark
                </button>
            </div>

            <div class="input-group">
                <label>🧷 Base Address (Hex)</label>
                <input type="text" id="baseInput" placeholder="Ví dụ: 0x7FF7A0000000 hoặc 400000" autocomplete="off">
                <div class="hint">Bạn có thể dán nguyên cụm "0xBase + 0x10 + 0x20" – công cụ sẽ tự tách.</div>
            </div>

            <div class="input-group">
                <label>🔗 Offsets (phân cách bởi dấu phẩy hoặc +)</label>
                <input type="text" id="offsetsInput" placeholder="0x10, 0x20, 0x30   hoặc   0xA8 + 0x1C0" autocomplete="off">
                <div class="hint">Hỗ trợ: 0x10,0x20 / 0x10+0x20 / 10 20 (tự động tách)</div>
            </div>

            <div class="actions">
                <button id="calculateBtn">🧮 Tính toán</button>
                <button id="copyCppBtn" class="outline">📋 Copy as C++ Pointer</button>
                <button id="copyExpressionBtn" class="outline">📎 Copy Expression</button>
            </div>

            <div style="margin-top: 1rem;">
                <label>📍 Địa chỉ cuối cùng (Final Address):</label>
                <div class="result-box" id="resultBox">
                    <span class="result-value" id="finalAddressDisplay">—</span>
                    <button class="copy-btn-small" id="copyResultBtn" title="Sao chép địa chỉ">📋</button>
                </div>
                <div class="error-message" id="errorMsg"></div>
            </div>

            <!-- XOR Tool Section -->
            <div class="divider"></div>
            <div class="xor-section">
                <h3><span>🔐</span> XOR Tool (Fixed Key)</h3>
                <div class="xor-row">
                    <div class="xor-input">
                        <label>Hex Data</label>
                        <input type="text" id="xorDataInput" placeholder="e.g. 48656C6C6F" autocomplete="off">
                    </div>
                    <div class="xor-input">
                        <label>Key (hex)</label>
                        <input type="text" id="xorKeyInput" placeholder="e.g. 42" autocomplete="off">
                    </div>
                    <button id="xorCalculateBtn" style="height: 44px;">XOR</button>
                </div>
                <div class="xor-result" id="xorResultDisplay">Kết quả hiện ở đây</div>
            </div>
        </div>
        <div class="footer">
            idk make for whut
        </div>
    </div>

    <canvas id="cursor-canvas"></canvas>

    <script>
        (function() {
            // cuztom ejine cuhsor
            const canvas = document.getElementById('cursor-canvas');
            const ctx = canvas.getContext('2d');

            let width, height;
            let mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
            let pos = { x: mouse.x, y: mouse.y };
            let isTextMode = false;
            const ease = 0.25;

            function initCanvas() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            }

            function checkUnderMouse() {
                const el = document.elementFromPoint(mouse.x, mouse.y);
                if (el) {
                    const style = window.getComputedStyle(el);
                    isTextMode = (
                        style.cursor === 'text' || 
                        el.tagName === 'INPUT' || 
                        el.tagName === 'TEXTAREA' ||
                        el.tagName === 'P' ||
                        el.tagName === 'H1' ||
                        el.tagName === 'H2' ||
                        el.tagName === 'SPAN'
                    );
                }
            }

            window.addEventListener('mousemove', e => {
                mouse.x = e.clientX;
                mouse.y = e.clientY;
                checkUnderMouse();
            });

            function renderCursor() {
                ctx.clearRect(0, 0, width, height);

                pos.x += (mouse.x - pos.x) * ease;
                pos.y += (mouse.y - pos.y) * ease;

                const tilt = (mouse.x - pos.x) * 0.05;

                ctx.save();
                ctx.translate(pos.x, pos.y);
                
                ctx.shadowBlur = 10;
                ctx.shadowColor = 'rgba(255, 255, 255, 0.2)';

                if (isTextMode) {
                    ctx.strokeStyle = '#ffffff';
                    ctx.lineWidth = 1.3;
                    ctx.lineCap = 'round';

                    ctx.beginPath();
                    ctx.moveTo(0, -9);
                    ctx.lineTo(0, 9);
                    
                    ctx.moveTo(-4, -10);
                    ctx.quadraticCurveTo(0, -10, 0, -8);
                    ctx.quadraticCurveTo(0, -10, 4, -10);
                    
                    ctx.moveTo(-4, 10);
                    ctx.quadraticCurveTo(0, 10, 0, 8);
                    ctx.quadraticCurveTo(0, 10, 4, 10);
                    
                    ctx.stroke();

                    ctx.shadowBlur = 0;
                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 0.5;
                    ctx.stroke();
                } else {
                    ctx.rotate((tilt - 22.5) * (Math.PI / 180)); 

                    ctx.beginPath();
                    ctx.moveTo(0, -14);      
                    ctx.lineTo(8, 12);       
                    ctx.lineTo(0, 7);        
                    ctx.lineTo(-8, 12);      
                    ctx.closePath();

                    ctx.fillStyle = '#ffffff';
                    ctx.fill();
                    
                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 1.2;
                    ctx.stroke();
                }

                ctx.restore();
                requestAnimationFrame(renderCursor);
            }

            window.addEventListener('resize', initCanvas);
            initCanvas();
            renderCursor();

            // pointer map
            const baseInput = document.getElementById('baseInput');
            const offsetsInput = document.getElementById('offsetsInput');
            const calculateBtn = document.getElementById('calculateBtn');
            const finalAddressDisplay = document.getElementById('finalAddressDisplay');
            const errorMsg = document.getElementById('errorMsg');
            const copyCppBtn = document.getElementById('copyCppBtn');
            const copyExpressionBtn = document.getElementById('copyExpressionBtn');
            const copyResultBtn = document.getElementById('copyResultBtn');
            const themeToggle = document.getElementById('themeToggle');

            let lastBase = null;
            let lastOffsets = [];
            let lastFinal = null;

            // Theme
            const body = document.body;
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (prefersDark) {
                body.classList.add('dark');
                themeToggle.innerHTML = '☀️ Light';
            } else {
                body.classList.remove('dark');
                themeToggle.innerHTML = '🌙 Dark';
            }

            themeToggle.addEventListener('click', () => {
                body.classList.toggle('dark');
                if (body.classList.contains('dark')) {
                    themeToggle.innerHTML = '☀️ Light';
                } else {
                    themeToggle.innerHTML = '🌙 Dark';
                }
            });

            function parseHex(str) {
                str = str.trim();
                if (str.toLowerCase().startsWith('0x')) {
                    str = str.slice(2);
                }
                if (!/^[0-9a-fA-F]+$/.test(str)) {
                    throw new Error(`Giá trị hex không hợp lệ: "${str}"`);
                }
                return BigInt('0x' + str);
            }

            function parseOffsets(raw) {
                if (!raw.trim()) return [];
                let cleaned = raw.replace(/[,+]+/g, ' ');
                cleaned = cleaned.replace(/\s+/g, ' ').trim();
                const tokens = cleaned.split(' ');
                return tokens.filter(t => t !== '').map(t => parseHex(t));
            }

            function autoSplitIfNeeded() {
                const rawBase = baseInput.value.trim();
                if (offsetsInput.value.trim() !== '') return false;

                const hexToken = '0x[0-9a-fA-F]+|[0-9a-fA-F]+';
                const regex = new RegExp(`^\\s*(${hexToken})\\s*[\\s+]+\\s*(${hexToken}([\\s+]+${hexToken})*)\\s*$`);
                const match = rawBase.match(regex);
                if (match) {
                    const newBase = match[1];
                    let rest = match[2].replace(/[+]+/g, ' ').replace(/\s+/g, ' ').trim();
                    baseInput.value = newBase; 
                    offsetsInput.value = rest; 
                    return true;
                }
                return false;
            }

            function calculate() {
                errorMsg.style.display = 'none';
                finalAddressDisplay.textContent = '—';
                lastBase = null;
                lastOffsets = [];
                lastFinal = null;

                try {
                    // split thong minh nhat trai dat
                    autoSplitIfNeeded();

                    const baseStr = baseInput.value.trim();
                    if (!baseStr) throw new Error('Vui lòng nhập Base Address.');

                    const base = parseHex(baseStr);
                    lastBase = base;

                    const offsetsStr = offsetsInput.value.trim();
                    const offsets = parseOffsets(offsetsStr);
                    lastOffsets = offsets;

                    let final = base;
                    for (const offset of offsets) {
                        final += offset;
                    }

                    lastFinal = final;
                    finalAddressDisplay.textContent = '0x' + final.toString(16).toUpperCase();
                } catch (e) {
                    errorMsg.style.display = 'block';
                    errorMsg.textContent = '⚠️ ' + e.message;
                }
            }

            function copyToClipboard(text) {
                navigator.clipboard.writeText(text).then(() => {
                    const el = event.target;
                    const original = el.textContent;
                    el.textContent = '✅ Đã copy!';
                    setTimeout(() => {
                        el.textContent = original;
                    }, 1200);
                }).catch(() => {
                    alert('Sao chép thất bại, vui lòng thử lại.');
                });
            }

            copyCppBtn.addEventListener('click', (e) => {
                if (lastFinal === null) calculate();
                if (lastFinal !== null) {
                    const code = `*(uintptr_t*)0x${lastFinal.toString(16).toUpperCase()}`;
                    copyToClipboard.call({ target: copyCppBtn }, code);
                }
            });

            copyExpressionBtn.addEventListener('click', (e) => {
                if (lastBase === null) calculate();
                if (lastBase !== null) {
                    let expr = `0x${lastBase.toString(16).toUpperCase()}`;
                    if (lastOffsets.length > 0) {
                        const sumHex = lastOffsets.reduce((a, b) => a + b, 0n).toString(16).toUpperCase();
                        expr += ` + 0x${sumHex}`;
                    }
                    copyToClipboard.call({ target: copyExpressionBtn }, expr);
                }
            });

            copyResultBtn.addEventListener('click', (e) => {
                const text = finalAddressDisplay.textContent;
                if (text && text !== '—') {
                    copyToClipboard.call({ target: copyResultBtn }, text);
                } else {
                    calculate();
                    if (finalAddressDisplay.textContent !== '—') {
                        copyToClipboard.call({ target: copyResultBtn }, finalAddressDisplay.textContent);
                    }
                }
            });

            calculateBtn.addEventListener('click', calculate);

            baseInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') calculate();
            });
            offsetsInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') calculate();
            });

            // Xor lozic
            const xorDataInput = document.getElementById('xorDataInput');
            const xorKeyInput = document.getElementById('xorKeyInput');
            const xorCalculateBtn = document.getElementById('xorCalculateBtn');
            const xorResultDisplay = document.getElementById('xorResultDisplay');

            function hexToBytes(hex) {
                hex = hex.replace(/\s+/g, '').replace(/^0x/i, '');
                if (hex.length % 2 !== 0) {
                    throw new Error('Chuỗi hex phải có độ dài chẵn.');
                }
                const bytes = [];
                for (let i = 0; i < hex.length; i += 2) {
                    bytes.push(parseInt(hex.substr(i, 2), 16));
                }
                return bytes;
            }

            function bytesToHex(bytes) {
                return bytes.map(b => b.toString(16).padStart(2, '0')).join('');
            }

            function xorBytes(dataBytes, keyBytes) {
                const result = [];
                for (let i = 0; i < dataBytes.length; i++) {
                    result.push(dataBytes[i] ^ keyBytes[i % keyBytes.length]);
                }
                return result;
            }

            function calculateXor() {
                try {
                    const dataStr = xorDataInput.value.trim();
                    const keyStr = xorKeyInput.value.trim();
                    if (!dataStr || !keyStr) {
                        xorResultDisplay.textContent = 'Vui lòng nhập cả Data và Key.';
                        return;
                    }
                    const dataBytes = hexToBytes(dataStr);
                    const keyBytes = hexToBytes(keyStr);
                    const xorResult = xorBytes(dataBytes, keyBytes);
                    xorResultDisplay.textContent = '0x' + bytesToHex(xorResult).toUpperCase();
                } catch (e) {
                    xorResultDisplay.textContent = 'Lỗi: ' + e.message;
                }
            }

            xorCalculateBtn.addEventListener('click', calculateXor);
            xorDataInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    xorKeyInput.focus();
                }
            });
            xorKeyInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') calculateXor();
            });

            baseInput.addEventListener('paste', (e) => {
                setTimeout(() => {
                    if (offsetsInput.value.trim() === '') {
                        autoSplitIfNeeded();
                    }
                }, 10);
            });
        })();
    </script>
</body>
</html>
